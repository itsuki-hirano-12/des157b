<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Science+Gothic:wght@100..900&display=swap" rel="stylesheet">

    <link href="styles.css" rel="stylesheet">

    <script src="script.js" defer></script>
    <title>Check Yourself</title>
</head>
<body>
    
    <main>
        <section>
            <img src="images/map.svg" alt="map" id="map" class="map0">
            <div id="routes">
                <!-- <img src="images/route1.svg" alt="first route" id="firstMotion"> -->
                <!-- <img src="images/route2.svg" alt="second route" id="secondMotion"> -->
                <!-- <img src="images/route3.svg" alt="third route" id="thirdMotion"> -->
                <!-- <img src="images/route4.svg" alt="fourth route" id="fourthMotion">
                <img src="images/final.svg" alt="final summary" id="routeSummary"> -->
            </div>
        </section>
    
        <article>
            <h1>8:00 AM</h1>
            <div id="textContainer">
                <p id="action">I woke up</p>
            </div>
            
            <p id="distance">Distance traveled: 0 Miles</p>

            <div id="buttons">
                <button id="back" class="hidden">Back</button>
                <button id="next" class="buttonOn">Next</button>
            </div>

            
        </article>

        <div id="total">
            <p>Total Distance Traveled: 0 Miles</p>
            <div id="bar">
                <div id="route1" class="routeBar"></div>
                <div id="misc" class="routeBar"></div>
                <div id="route2" class="routeBar"></div>
                <div id="route3" class="routeBar"></div>
                <div id="route4" class="routeBar"></div>
                <div id="invis" class="routeBar"></div>
            </div>
        </div>
    </main>
    
</body>
</html>
